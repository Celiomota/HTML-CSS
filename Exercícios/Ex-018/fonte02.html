<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'Cherishfree';
            src: url(cherishfree01.ttf) format('opentype'), url(cherishfree02.otf) format('truetype');
            font-weight: normal;
            font-style: italic;

            /*
            Tipos de format()
            - Opentype (otf)
            -truetype (ttf)
            -embedded-opentype
            -truetype-aat (Apple Advanced Typoghaphy)
            -svg
            */
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        h1{
            font-family: 'Cherishfree', sans-serif;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Exercitationem id nihil minima tempore facere ipsa itaque reiciendis, vel, distinctio voluptas, maxime reprehenderit enim voluptate facilis perferendis sed aliquam consequuntur ea.</p>
</body>
</html>
