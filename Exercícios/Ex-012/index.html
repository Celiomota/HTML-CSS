<body>
    <h1>Vídeos no site</h1>
    <p>Vamos aprender a colocar vídeos no site hospedados localmente</p>
    <video controls width="560" poster="imagens/limoes-capa.png" autoplay loop>

        <!--Tenta carregar na ordem que foi colocado-->
        <!--Carregar vídeos localmente gera um gasto enorme de largura de banda (Caro pra cct)-->
    </video>

    <h1>Inserindo vídeos do Youtube</h1>
